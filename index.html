<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Nick's Dashboard</title>
  <link rel="manifest" href="manifest.json" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F7F6F3; font-family: 'Segoe UI', Inter, system-ui, sans-serif; color: #1A1A1A; }
    input, select, button, textarea { font-family: inherit; }
    input:focus, textarea:focus, select:focus { outline: 2px solid #1A1A1A; outline-offset: 1px; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const SK = "nick_life_v2";
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 5);

const DEFAULTS = {
  lastReset: new Date().toDateString(),
  profile: { name: "Nick", role: "Teleport QA & ISO Compliance Intern", base: "Puchong, Selangor" },
  tasks: [
    { id: uid(), text: "Prepare for Teleport onboarding (16 Jun)", done: false, priority: "high", category: "Work" },
    { id: uid(), text: "Review ISO 9001 / 14001 / 45001 basics", done: false, priority: "high", category: "Work" },
    { id: uid(), text: "Pack bag for RedQ commute", done: false, priority: "medium", category: "Personal" },
  ],
  career: [
    { id: uid(), title: "Teleport QA & ISO Compliance Intern", status: "active", note: "IMS audit readiness — Sept 2026 deadline", date: "Jun 2026" },
    { id: uid(), title: "OSH Diploma — Fajar International College", status: "active", note: "Final year", date: "2026" },
    { id: uid(), title: "NEBOSH IGC", status: "planned", note: "Key credential for international mobility", date: "2027" },
    { id: uid(), title: "O&G Roles (Velesto / PETRONAS Carigali)", status: "planned", note: "Mid-term target post-diploma", date: "2027–2028" },
    { id: uid(), title: "International Drilling Contractors", status: "planned", note: "Transocean, Seadrill, Valaris, Noble", date: "2029+" },
  ],
  certifications: [
    { id: uid(), name: "T-BOSIET (OPITO)", issuer: "OPITO", expiry: "", status: "valid" },
    { id: uid(), name: "First Aid", issuer: "", expiry: "", status: "valid" },
    { id: uid(), name: "Fire Watcher", issuer: "", expiry: "", status: "valid" },
    { id: uid(), name: "Basic Rigging & Lifting", issuer: "", expiry: "", status: "valid" },
  ],
  finances: {
    income: [
      { id: uid(), label: "Internship allowance", amount: 0, frequency: "monthly" },
      { id: uid(), label: "Funko Pop resell profit", amount: 0, frequency: "monthly" },
    ],
    expenses: [
      { id: uid(), label: "Fuel (Puchong to Sepang)", amount: 0, frequency: "monthly" },
      { id: uid(), label: "Skincare", amount: 75, frequency: "monthly" },
      { id: uid(), label: "Food & daily", amount: 0, frequency: "monthly" },
    ],
    flips: [],
  },
  habits: [
    { id: uid(), name: "Skincare routine", streak: 0, done: false, category: "Health" },
    { id: uid(), name: "Sleep before midnight", streak: 0, done: false, category: "Health" },
    { id: uid(), name: "Drink 2L water", streak: 0, done: false, category: "Health" },
    { id: uid(), name: "Review ISO notes", streak: 0, done: false, category: "Work" },
  ],
  notes: [],
};

function load() {
  try {
    const raw = localStorage.getItem(SK);
    if (!raw) return DEFAULTS;
    const d = JSON.parse(raw);
    if (d.lastReset !== new Date().toDateString()) {
      d.tasks = d.tasks.map(t => ({ ...t, done: false }));
      d.habits = d.habits.map(h => ({ ...h, streak: h.done ? h.streak : Math.max(0, h.streak - 1), done: false }));
      d.lastReset = new Date().toDateString();
    }
    return { ...DEFAULTS, ...d, finances: { ...DEFAULTS.finances, ...d.finances } };
  } catch { return DEFAULTS; }
}

const TABS = ["Today", "Career", "Finances", "Habits", "Notes"];
const PRIORITY_COLOR = { high: "#E05A5A", medium: "#E09A2A", low: "#6BAF92" };
const STATUS_COLOR = { active: "#6BAF92", planned: "#7BA7C9", done: "#aaa", expired: "#E05A5A", valid: "#6BAF92" };

const Badge = ({ label, color }) => (
  <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 10, background: color + "22", color, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.06em" }}>{label}</span>
);

const Card = ({ children, style = {} }) => (
  <div style={{ background: "#fff", border: "1px solid #E4E2DC", borderRadius: 10, padding: "14px", marginBottom: 8, ...style }}>{children}</div>
);

const SectionLabel = ({ children }) => (
  <div style={{ fontSize: 11, color: "#999", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 10, marginTop: 4 }}>{children}</div>
);

const Btn = ({ onClick, children, variant = "primary", style = {} }) => (
  <button onClick={onClick} style={{
    padding: "8px 14px",
    background: variant === "primary" ? "#1A1A1A" : variant === "danger" ? "#E05A5A" : "#F0EFEB",
    color: variant === "ghost" ? "#555" : "#fff",
    border: "none", borderRadius: 8, fontSize: 13, cursor: "pointer", fontWeight: 600, ...style
  }}>{children}</button>
);

const Inp = ({ value, onChange, placeholder, style = {} }) => (
  <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} style={{
    padding: "8px 11px", border: "1px solid #E4E2DC", borderRadius: 8, fontSize: 13,
    background: "#FAFAF8", width: "100%", ...style
  }} />
);

const Sel = ({ value, onChange, options, style = {} }) => (
  <select value={value} onChange={e => onChange(e.target.value)} style={{
    padding: "8px 10px", border: "1px solid #E4E2DC", borderRadius: 8, fontSize: 13,
    background: "#FAFAF8", cursor: "pointer", width: "100%", ...style
  }}>
    {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
  </select>
);

function Modal({ title, onClose, children }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 100, display: "flex", alignItems: "flex-end" }}>
      <div style={{ background: "#fff", borderRadius: "16px 16px 0 0", width: "100%", maxWidth: 640, margin: "0 auto", padding: "20px 16px 36px", maxHeight: "88vh", overflowY: "auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <span style={{ fontWeight: 700, fontSize: 16 }}>{title}</span>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 24, color: "#aaa", cursor: "pointer", lineHeight: 1 }}>x</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function TodayTab({ data, setData }) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ text: "", priority: "medium", category: "Personal" });

  const toggle = id => setData(d => ({ ...d, tasks: d.tasks.map(t => t.id === id ? { ...t, done: !t.done } : t) }));
  const remove = id => setData(d => ({ ...d, tasks: d.tasks.filter(t => t.id !== id) }));
  const add = () => {
    if (!form.text.trim()) return;
    setData(d => ({ ...d, tasks: [...d.tasks, { id: uid(), ...form, done: false }] }));
    setForm({ text: "", priority: "medium", category: "Personal" });
    setModal(false);
  };

  const done = data.tasks.filter(t => t.done).length;
  const pct = data.tasks.length ? Math.round((done / data.tasks.length) * 100) : 0;
  const grouped = ["Work", "Personal", "Health", "Other"].map(cat => ({ cat, items: data.tasks.filter(t => (t.category || "Personal") === cat) })).filter(g => g.items.length);

  return (
    <div>
      <Card style={{ marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
          <span style={{ fontWeight: 600, fontSize: 14 }}>Today's Progress</span>
          <span style={{ fontSize: 13, color: "#888" }}>{done}/{data.tasks.length}</span>
        </div>
        <div style={{ height: 6, background: "#F0EFEB", borderRadius: 99 }}>
          <div style={{ height: 6, background: pct === 100 ? "#6BAF92" : "#1A1A1A", borderRadius: 99, width: pct + "%", transition: "width 0.3s" }} />
        </div>
        {pct === 100 && <div style={{ fontSize: 12, color: "#6BAF92", marginTop: 6, fontWeight: 600 }}>All done — great work!</div>}
      </Card>

      {grouped.map(({ cat, items }) => (
        <div key={cat}>
          <SectionLabel>{cat}</SectionLabel>
          {items.map(t => (
            <div key={t.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 12px", background: "#fff", borderRadius: 8, marginBottom: 6, border: "1px solid #E4E2DC", opacity: t.done ? 0.45 : 1 }}>
              <div style={{ width: 9, height: 9, borderRadius: "50%", background: PRIORITY_COLOR[t.priority], flexShrink: 0 }} />
              <span onClick={() => toggle(t.id)} style={{ flex: 1, fontSize: 14, cursor: "pointer", textDecoration: t.done ? "line-through" : "none" }}>{t.text}</span>
              <button onClick={() => remove(t.id)} style={{ background: "none", border: "none", color: "#ccc", cursor: "pointer", fontSize: 20, lineHeight: 1 }}>x</button>
            </div>
          ))}
        </div>
      ))}

      <Btn onClick={() => setModal(true)} style={{ marginTop: 8, width: "100%" }}>+ Add Task</Btn>

      <div style={{ marginTop: 20 }}><SectionLabel>Habits Today</SectionLabel></div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        {data.habits.map(h => (
          <button key={h.id} onClick={() => setData(d => ({ ...d, habits: d.habits.map(x => x.id === h.id ? { ...x, done: !x.done, streak: !x.done ? x.streak + 1 : Math.max(0, x.streak - 1) } : x) }))}
            style={{ padding: "7px 13px", borderRadius: 20, border: "1px solid " + (h.done ? "#6BAF92" : "#E4E2DC"), background: h.done ? "#EEF7F3" : "#fff", color: h.done ? "#3A8A5F" : "#555", fontSize: 13, cursor: "pointer", fontWeight: h.done ? 600 : 400 }}>
            {h.done ? "v " : ""}{h.name}{h.streak > 1 ? " · " + h.streak + "d" : ""}
          </button>
        ))}
      </div>

      {modal && (
        <Modal title="New Task" onClose={() => setModal(false)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <Inp value={form.text} onChange={v => setForm(f => ({ ...f, text: v }))} placeholder="What needs doing?" />
            <Sel value={form.priority} onChange={v => setForm(f => ({ ...f, priority: v }))} options={[{ value: "high", label: "High priority" }, { value: "medium", label: "Medium" }, { value: "low", label: "Low" }]} />
            <Sel value={form.category} onChange={v => setForm(f => ({ ...f, category: v }))} options={["Work","Personal","Health","Other"].map(c => ({ value: c, label: c }))} />
            <Btn onClick={add} style={{ width: "100%" }}>Add Task</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

function CareerTab({ data, setData }) {
  const [modal, setModal] = useState(null);
  const [editId, setEditId] = useState(null);
  const [mForm, setMForm] = useState({ title: "", status: "planned", note: "", date: "" });
  const [cForm, setCForm] = useState({ name: "", issuer: "", expiry: "", status: "valid" });

  const openM = (item = null) => { setEditId(item?.id || null); setMForm(item ? { title: item.title, status: item.status, note: item.note, date: item.date } : { title: "", status: "planned", note: "", date: "" }); setModal("milestone"); };
  const saveM = () => { if (!mForm.title.trim()) return; setData(d => ({ ...d, career: editId ? d.career.map(c => c.id === editId ? { ...c, ...mForm } : c) : [...d.career, { id: uid(), ...mForm }] })); setModal(null); };
  const delM = id => setData(d => ({ ...d, career: d.career.filter(c => c.id !== id) }));

  const openC = (item = null) => { setEditId(item?.id || null); setCForm(item ? { name: item.name, issuer: item.issuer, expiry: item.expiry, status: item.status } : { name: "", issuer: "", expiry: "", status: "valid" }); setModal("cert"); };
  const saveC = () => { if (!cForm.name.trim()) return; setData(d => ({ ...d, certifications: editId ? d.certifications.map(c => c.id === editId ? { ...c, ...cForm } : c) : [...d.certifications, { id: uid(), ...cForm }] })); setModal(null); };
  const delC = id => setData(d => ({ ...d, certifications: d.certifications.filter(c => c.id !== id) }));

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <SectionLabel>Milestones</SectionLabel>
        <Btn onClick={() => openM()} variant="ghost" style={{ fontSize: 12, padding: "5px 10px" }}>+ Add</Btn>
      </div>
      {data.career.map(c => (
        <Card key={c.id}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 5, flexWrap: "wrap" }}>
                <Badge label={c.status} color={STATUS_COLOR[c.status]} />
                {c.date && <span style={{ fontSize: 11, color: "#aaa" }}>{c.date}</span>}
              </div>
              <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 3 }}>{c.title}</div>
              {c.note && <div style={{ fontSize: 13, color: "#777" }}>{c.note}</div>}
            </div>
            <div style={{ display: "flex", gap: 8, marginLeft: 8 }}>
              <button onClick={() => openM(c)} style={{ background: "none", border: "none", color: "#aaa", cursor: "pointer", fontSize: 16 }}>e</button>
              <button onClick={() => delM(c.id)} style={{ background: "none", border: "none", color: "#E05A5A", cursor: "pointer", fontSize: 16 }}>x</button>
            </div>
          </div>
        </Card>
      ))}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10, marginTop: 20 }}>
        <SectionLabel>Certifications</SectionLabel>
        <Btn onClick={() => openC()} variant="ghost" style={{ fontSize: 12, padding: "5px 10px" }}>+ Add</Btn>
      </div>
      {data.certifications.map(c => (
        <Card key={c.id}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ display: "flex", gap: 7, alignItems: "center", marginBottom: 4 }}>
                <Badge label={c.status} color={STATUS_COLOR[c.status]} />
                {c.expiry && <span style={{ fontSize: 11, color: "#aaa" }}>Expires {c.expiry}</span>}
              </div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>{c.name}</div>
              {c.issuer && <div style={{ fontSize: 12, color: "#999", marginTop: 2 }}>{c.issuer}</div>}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => openC(c)} style={{ background: "none", border: "none", color: "#aaa", cursor: "pointer", fontSize: 16 }}>e</button>
              <button onClick={() => delC(c.id)} style={{ background: "none", border: "none", color: "#E05A5A", cursor: "pointer", fontSize: 16 }}>x</button>
            </div>
          </div>
        </Card>
      ))}

      <Card style={{ marginTop: 20, background: "#F0F4FF", border: "1px solid #D0DAFA" }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: "#3A5BB5", marginBottom: 8 }}>Key Dates</div>
        {[{ label: "Onboarding", date: "16 & 18 Jun 2026" }, { label: "Operations training", date: "3 Jul 2026" }, { label: "IMS audit deadline", date: "Sept 2026" }, { label: "Commute", date: "Puchong to RedQ, Sepang" }].map(r => (
          <div key={r.label} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#444", padding: "5px 0", borderBottom: "1px solid #E4EAFF" }}>
            <span>{r.label}</span><strong>{r.date}</strong>
          </div>
        ))}
      </Card>

      {modal === "milestone" && (
        <Modal title={editId ? "Edit Milestone" : "New Milestone"} onClose={() => setModal(null)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <Inp value={mForm.title} onChange={v => setMForm(f => ({ ...f, title: v }))} placeholder="Title" />
            <Inp value={mForm.note} onChange={v => setMForm(f => ({ ...f, note: v }))} placeholder="Note (optional)" />
            <Inp value={mForm.date} onChange={v => setMForm(f => ({ ...f, date: v }))} placeholder="Date / timeframe" />
            <Sel value={mForm.status} onChange={v => setMForm(f => ({ ...f, status: v }))} options={[{ value: "active", label: "Active" }, { value: "planned", label: "Planned" }, { value: "done", label: "Done" }]} />
            <Btn onClick={saveM} style={{ width: "100%" }}>{editId ? "Save Changes" : "Add Milestone"}</Btn>
          </div>
        </Modal>
      )}
      {modal === "cert" && (
        <Modal title={editId ? "Edit Certification" : "New Certification"} onClose={() => setModal(null)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <Inp value={cForm.name} onChange={v => setCForm(f => ({ ...f, name: v }))} placeholder="Certification name" />
            <Inp value={cForm.issuer} onChange={v => setCForm(f => ({ ...f, issuer: v }))} placeholder="Issuing body (optional)" />
            <Inp value={cForm.expiry} onChange={v => setCForm(f => ({ ...f, expiry: v }))} placeholder="Expiry date (optional)" />
            <Sel value={cForm.status} onChange={v => setCForm(f => ({ ...f, status: v }))} options={[{ value: "valid", label: "Valid" }, { value: "expired", label: "Expired" }, { value: "planned", label: "In Progress" }]} />
            <Btn onClick={saveC} style={{ width: "100%" }}>{editId ? "Save Changes" : "Add Cert"}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

function FinancesTab({ data, setData }) {
  const [modal, setModal] = useState(null);
  const [editId, setEditId] = useState(null);
  const [type, setType] = useState("income");
  const [form, setForm] = useState({ label: "", amount: "", frequency: "monthly" });
  const [flipForm, setFlipForm] = useState({ item: "", cost: "", sold: "", date: "" });

  const totalIncome = data.finances.income.reduce((s, i) => s + (parseFloat(i.amount) || 0), 0);
  const totalExpenses = data.finances.expenses.reduce((s, i) => s + (parseFloat(i.amount) || 0), 0);
  const net = totalIncome - totalExpenses;
  const totalFlipProfit = (data.finances.flips || []).reduce((s, f) => s + ((parseFloat(f.sold) || 0) - (parseFloat(f.cost) || 0)), 0);

  const openEntry = (t, item = null) => { setType(t); setEditId(item?.id || null); setForm(item ? { label: item.label, amount: item.amount, frequency: item.frequency } : { label: "", amount: "", frequency: "monthly" }); setModal("entry"); };
  const saveEntry = () => {
    if (!form.label.trim()) return;
    const entry = { id: editId || uid(), label: form.label, amount: parseFloat(form.amount) || 0, frequency: form.frequency };
    setData(d => ({ ...d, finances: { ...d.finances, [type]: editId ? d.finances[type].map(x => x.id === editId ? entry : x) : [...d.finances[type], entry] } }));
    setModal(null);
  };
  const delEntry = (t, id) => setData(d => ({ ...d, finances: { ...d.finances, [t]: d.finances[t].filter(x => x.id !== id) } }));
  const addFlip = () => {
    if (!flipForm.item.trim()) return;
    setData(d => ({ ...d, finances: { ...d.finances, flips: [...(d.finances.flips || []), { id: uid(), ...flipForm }] } }));
    setFlipForm({ item: "", cost: "", sold: "", date: "" });
    setModal(null);
  };
  const delFlip = id => setData(d => ({ ...d, finances: { ...d.finances, flips: d.finances.flips.filter(f => f.id !== id) } }));

  const updateAmt = (t, id, val) => setData(d => ({ ...d, finances: { ...d.finances, [t]: d.finances[t].map(x => x.id === id ? { ...x, amount: parseFloat(val) || 0 } : x) } }));

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 16 }}>
        {[{ label: "Income", val: totalIncome, color: "#6BAF92" }, { label: "Expenses", val: totalExpenses, color: "#E05A5A" }, { label: "Net", val: net, color: net >= 0 ? "#6BAF92" : "#E05A5A" }].map(s => (
          <Card key={s.label} style={{ textAlign: "center", padding: "12px 8px" }}>
            <div style={{ fontSize: 11, color: "#aaa", textTransform: "uppercase", letterSpacing: "0.08em" }}>{s.label}</div>
            <div style={{ fontWeight: 700, fontSize: 16, color: s.color, marginTop: 4 }}>RM {s.val.toFixed(0)}</div>
          </Card>
        ))}
      </div>

      {["income", "expenses"].map(t => (
        <div key={t}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <SectionLabel>{t === "income" ? "Income" : "Expenses"}</SectionLabel>
            <Btn onClick={() => openEntry(t)} variant="ghost" style={{ fontSize: 12, padding: "5px 10px" }}>+ Add</Btn>
          </div>
          <Card>
            {data.finances[t].map(i => (
              <div key={i.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: "1px solid #F0EFEB" }}>
                <span style={{ fontSize: 13, color: "#444", flex: 1 }}>{i.label}</span>
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  <span style={{ fontSize: 11, color: "#bbb" }}>RM</span>
                  <input type="number" value={i.amount} onChange={e => updateAmt(t, i.id, e.target.value)} style={{ width: 72, padding: "3px 7px", border: "1px solid #E4E2DC", borderRadius: 6, fontSize: 13, textAlign: "right", fontWeight: 600 }} />
                  <button onClick={() => delEntry(t, i.id)} style={{ background: "none", border: "none", color: "#ddd", cursor: "pointer", fontSize: 18 }}>x</button>
                </div>
              </div>
            ))}
          </Card>
        </div>
      ))}

      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
        <SectionLabel>Funko Flips</SectionLabel>
        <Btn onClick={() => setModal("flip")} variant="ghost" style={{ fontSize: 12, padding: "5px 10px" }}>+ Log Flip</Btn>
      </div>
      {(data.finances.flips || []).length === 0 && <Card style={{ color: "#aaa", fontSize: 13, textAlign: "center" }}>No flips logged yet</Card>}
      {(data.finances.flips || []).map(f => {
        const profit = (parseFloat(f.sold) || 0) - (parseFloat(f.cost) || 0);
        return (
          <Card key={f.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{f.item}</div>
                <div style={{ fontSize: 12, color: "#aaa", marginTop: 2 }}>Cost RM{f.cost} → Sold RM{f.sold}{f.date ? " · " + f.date : ""}</div>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <span style={{ fontWeight: 700, fontSize: 15, color: profit >= 0 ? "#6BAF92" : "#E05A5A" }}>{profit >= 0 ? "+" : ""}RM{profit.toFixed(0)}</span>
                <button onClick={() => delFlip(f.id)} style={{ background: "none", border: "none", color: "#ddd", cursor: "pointer", fontSize: 18 }}>x</button>
              </div>
            </div>
          </Card>
        );
      })}
      {(data.finances.flips || []).length > 0 && (
        <Card style={{ background: "#EEF7F3", border: "1px solid #C2E0D2", textAlign: "center" }}>
          <span style={{ fontSize: 13, color: "#555" }}>Total flip profit: </span>
          <strong style={{ color: totalFlipProfit >= 0 ? "#3A8A5F" : "#E05A5A" }}>RM {totalFlipProfit.toFixed(2)}</strong>
        </Card>
      )}

      {modal === "entry" && (
        <Modal title={(editId ? "Edit " : "New ") + (type === "income" ? "Income" : "Expense")} onClose={() => setModal(null)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <Inp value={form.label} onChange={v => setForm(f => ({ ...f, label: v }))} placeholder="Label" />
            <Inp value={form.amount} onChange={v => setForm(f => ({ ...f, amount: v }))} placeholder="Amount (RM)" />
            <Sel value={form.frequency} onChange={v => setForm(f => ({ ...f, frequency: v }))} options={[{ value: "monthly", label: "Monthly" }, { value: "weekly", label: "Weekly" }, { value: "one-off", label: "One-off" }]} />
            <Btn onClick={saveEntry} style={{ width: "100%" }}>Save</Btn>
          </div>
        </Modal>
      )}
      {modal === "flip" && (
        <Modal title="Log a Flip" onClose={() => setModal(null)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <Inp value={flipForm.item} onChange={v => setFlipForm(f => ({ ...f, item: v }))} placeholder="Item name (e.g. Spider-Man #593)" />
            <div style={{ display: "flex", gap: 8 }}>
              <Inp value={flipForm.cost} onChange={v => setFlipForm(f => ({ ...f, cost: v }))} placeholder="Cost (RM)" />
              <Inp value={flipForm.sold} onChange={v => setFlipForm(f => ({ ...f, sold: v }))} placeholder="Sold (RM)" />
            </div>
            <Inp value={flipForm.date} onChange={v => setFlipForm(f => ({ ...f, date: v }))} placeholder="Date (optional)" />
            <Btn onClick={addFlip} style={{ width: "100%" }}>Log Flip</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

function HabitsTab({ data, setData }) {
  const [modal, setModal] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ name: "", category: "Health" });

  const toggle = id => setData(d => ({ ...d, habits: d.habits.map(h => h.id === id ? { ...h, done: !h.done, streak: !h.done ? h.streak + 1 : Math.max(0, h.streak - 1) } : h) }));
  const remove = id => setData(d => ({ ...d, habits: d.habits.filter(h => h.id !== id) }));
  const open = (item = null) => { setEditId(item?.id || null); setForm(item ? { name: item.name, category: item.category } : { name: "", category: "Health" }); setModal(true); };
  const save = () => {
    if (!form.name.trim()) return;
    setData(d => ({ ...d, habits: editId ? d.habits.map(h => h.id === editId ? { ...h, ...form } : h) : [...d.habits, { id: uid(), ...form, streak: 0, done: false }] }));
    setModal(false);
  };

  const grouped = ["Work","Health","Personal","Other"].map(cat => ({ cat, items: data.habits.filter(h => (h.category || "Health") === cat) })).filter(g => g.items.length);
  const longestStreak = data.habits.reduce((m, h) => Math.max(m, h.streak), 0);
  const completedToday = data.habits.filter(h => h.done).length;

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
        <Card style={{ textAlign: "center", padding: "12px" }}>
          <div style={{ fontSize: 11, color: "#aaa", textTransform: "uppercase", letterSpacing: "0.08em" }}>Done Today</div>
          <div style={{ fontWeight: 700, fontSize: 20, marginTop: 4 }}>{completedToday}/{data.habits.length}</div>
        </Card>
        <Card style={{ textAlign: "center", padding: "12px" }}>
          <div style={{ fontSize: 11, color: "#aaa", textTransform: "uppercase", letterSpacing: "0.08em" }}>Best Streak</div>
          <div style={{ fontWeight: 700, fontSize: 20, color: "#E09A2A", marginTop: 4 }}>{longestStreak}d</div>
        </Card>
      </div>

      {grouped.map(({ cat, items }) => (
        <div key={cat}>
          <SectionLabel>{cat}</SectionLabel>
          {items.map(h => (
            <div key={h.id} onClick={() => toggle(h.id)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px", background: "#fff", borderRadius: 8, marginBottom: 6, border: "1px solid " + (h.done ? "#6BAF92" : "#E4E2DC"), cursor: "pointer" }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 14 }}>{h.name}</div>
                <div style={{ fontSize: 12, color: "#aaa", marginTop: 2 }}>{h.streak} day streak</div>
              </div>
              <button onClick={e => { e.stopPropagation(); open(h); }} style={{ background: "none", border: "none", color: "#ccc", cursor: "pointer", fontSize: 14, padding: "4px" }}>Edit</button>
              <button onClick={e => { e.stopPropagation(); remove(h.id); }} style={{ background: "none", border: "none", color: "#E05A5A", cursor: "pointer", fontSize: 14, padding: "4px" }}>Del</button>
              <div style={{ width: 28, height: 28, borderRadius: "50%", background: h.done ? "#6BAF92" : "#F0EFEB", display: "flex", alignItems: "center", justifyContent: "center", color: h.done ? "#fff" : "#ccc", fontSize: 14, fontWeight: 700, flexShrink: 0 }}>
                {h.done ? "v" : ""}
              </div>
            </div>
          ))}
        </div>
      ))}

      <Btn onClick={() => open()} style={{ marginTop: 8, width: "100%" }}>+ Add Habit</Btn>

      {modal && (
        <Modal title={editId ? "Edit Habit" : "New Habit"} onClose={() => setModal(false)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <Inp value={form.name} onChange={v => setForm(f => ({ ...f, name: v }))} placeholder="Habit name" />
            <Sel value={form.category} onChange={v => setForm(f => ({ ...f, category: v }))} options={["Work","Health","Personal","Other"].map(c => ({ value: c, label: c }))} />
            <Btn onClick={save} style={{ width: "100%" }}>{editId ? "Save Changes" : "Add Habit"}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

function NotesTab({ data, setData }) {
  const [modal, setModal] = useState(false);
  const [editId, setEditId] = useState(null);
  const [form, setForm] = useState({ title: "", body: "", tag: "General" });

  const TAGS = ["General","Work","ISO/Audit","Ideas","Health"];
  const TAG_COLOR = { General: "#888", Work: "#7BA7C9", "ISO/Audit": "#3A5BB5", Ideas: "#E09A2A", Health: "#6BAF92" };

  const open = (item = null) => { setEditId(item?.id || null); setForm(item ? { title: item.title, body: item.body, tag: item.tag } : { title: "", body: "", tag: "General" }); setModal(true); };
  const save = () => {
    if (!form.title.trim()) return;
    const note = { id: editId || uid(), ...form, updatedAt: new Date().toLocaleDateString("en-MY", { day: "numeric", month: "short" }) };
    setData(d => ({ ...d, notes: editId ? d.notes.map(n => n.id === editId ? note : n) : [note, ...d.notes] }));
    setModal(false);
  };
  const remove = id => setData(d => ({ ...d, notes: d.notes.filter(n => n.id !== id) }));

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <SectionLabel>Notes</SectionLabel>
        <Btn onClick={() => open()} variant="ghost" style={{ fontSize: 12, padding: "5px 10px" }}>+ New Note</Btn>
      </div>
      {data.notes.length === 0 && <Card style={{ textAlign: "center", color: "#aaa", fontSize: 14, padding: "32px" }}>No notes yet — jot down ideas, audit prep, anything.</Card>}
      {data.notes.map(n => (
        <Card key={n.id} style={{ cursor: "pointer" }} onClick={() => open(n)}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div style={{ flex: 1 }}>
              <div style={{ display: "flex", gap: 7, alignItems: "center", marginBottom: 5 }}>
                <Badge label={n.tag} color={TAG_COLOR[n.tag] || "#888"} />
                {n.updatedAt && <span style={{ fontSize: 11, color: "#ccc" }}>{n.updatedAt}</span>}
              </div>
              <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 4 }}>{n.title}</div>
              {n.body && <div style={{ fontSize: 13, color: "#777", display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{n.body}</div>}
            </div>
            <button onClick={e => { e.stopPropagation(); remove(n.id); }} style={{ background: "none", border: "none", color: "#E05A5A", cursor: "pointer", fontSize: 16, marginLeft: 8 }}>x</button>
          </div>
        </Card>
      ))}
      {modal && (
        <Modal title={editId ? "Edit Note" : "New Note"} onClose={() => setModal(false)}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <Inp value={form.title} onChange={v => setForm(f => ({ ...f, title: v }))} placeholder="Title" />
            <Sel value={form.tag} onChange={v => setForm(f => ({ ...f, tag: v }))} options={TAGS.map(t => ({ value: t, label: t }))} />
            <textarea value={form.body} onChange={e => setForm(f => ({ ...f, body: e.target.value }))} placeholder="Write anything..." style={{ padding: "10px 12px", border: "1px solid #E4E2DC", borderRadius: 8, fontSize: 13, minHeight: 130, resize: "vertical", fontFamily: "inherit", background: "#FAFAF8" }} />
            <Btn onClick={save} style={{ width: "100%" }}>{editId ? "Save Changes" : "Add Note"}</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("Today");
  const [data, setData] = useState(load);

  useEffect(() => { localStorage.setItem(SK, JSON.stringify(data)); }, [data]);

  const today = new Date().toLocaleDateString("en-MY", { weekday: "long", day: "numeric", month: "long" });
  const doneTasks = data.tasks.filter(t => t.done).length;

  return (
    <div style={{ minHeight: "100vh", background: "#F7F6F3" }}>
      <div style={{ background: "#fff", borderBottom: "1px solid #E4E2DC", padding: "1.5rem 1.25rem 0" }}>
        <div style={{ maxWidth: 640, margin: "0 auto" }}>
          <div style={{ fontSize: 11, letterSpacing: "0.12em", color: "#bbb", textTransform: "uppercase", marginBottom: 3 }}>{today}</div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <h1 style={{ fontSize: 21, fontWeight: 700, margin: 0, letterSpacing: "-0.01em" }}>Hey {data.profile.name}</h1>
              <p style={{ margin: "3px 0 0", fontSize: 12, color: "#888" }}>{data.profile.role} · {data.profile.base}</p>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 11, color: "#aaa" }}>Tasks</div>
              <div style={{ fontWeight: 700, fontSize: 16 }}>{doneTasks}/{data.tasks.length}</div>
            </div>
          </div>
          <div style={{ display: "flex", marginTop: 14, overflowX: "auto" }}>
            {TABS.map(t => (
              <button key={t} onClick={() => setTab(t)} style={{ padding: "10px 14px", border: "none", background: "transparent", borderBottom: tab === t ? "2px solid #1A1A1A" : "2px solid transparent", fontWeight: tab === t ? 700 : 400, fontSize: 13, color: tab === t ? "#1A1A1A" : "#aaa", cursor: "pointer", whiteSpace: "nowrap" }}>{t}</button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ maxWidth: 640, margin: "0 auto", padding: "1.25rem 1rem 5rem" }}>
        {tab === "Today" && <TodayTab data={data} setData={setData} />}
        {tab === "Career" && <CareerTab data={data} setData={setData} />}
        {tab === "Finances" && <FinancesTab data={data} setData={setData} />}
        {tab === "Habits" && <HabitsTab data={data} setData={setData} />}
        {tab === "Notes" && <NotesTab data={data} setData={setData} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
